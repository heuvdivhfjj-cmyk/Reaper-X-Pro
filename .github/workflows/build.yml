name: Build-Reaper-Final
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run-All-Commands
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev zip unzip cmake autoconf libtool pkg-config
          pip install cython==0.29.33 buildozer
          echo "from kivy.app import App; from kivy.uix.label import Label; class Main(App): build = lambda self: Label(text='🔱 REAPER ACTIVE'); Main().run()" > main.py
          yes | buildozer init
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          buildozer -v android debug
      - name: Get-The-File
        uses: actions/upload-artifact@v3
        with:
          name: Final-APK
          path: bin/*.apk
          
