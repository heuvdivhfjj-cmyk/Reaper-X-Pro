name: Build Reaper
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev zip unzip cmake autoconf libtool pkg-config
          pip install cython==0.29.33 buildozer
      - name: Create main.py
        run: |
          echo "from kivy.app import App; from kivy.uix.button import Button; class Main(App): build = lambda self: Button(text='🔱 REAPER ACTIVE ✅', font_size=30); Main().run()" > main.py
      - name: Build
        run: |
          yes | buildozer init
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          buildozer -v android debug
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Reaper-APK
          path: bin/*.apk
          
