name: Reaper_Build
on: [push, workflow_dispatch]
jobs:
  main_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Prep
        run: |
          sudo apt-get update
          pip install cython==0.29.33 buildozer
      - name: Create_Files
        run: |
          cat <<EOF > main.py
          from kivy.app import App
          from kivy.uix.button import Button
          class Reaper(App):
              build = lambda s: Button(text='🔱 REAPER ACTIVE', background_color=(1,0,0,1))
          Reaper().run()
          EOF
      - name: Build
        run: |
          yes | buildozer init
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          buildozer -v android debug
      - uses: actions/upload-artifact@v3
        with:
          name: Reaper-App
          path: bin/*.apk
